name: publish-nuget

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = if ($tag.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) { $tag.Substring(1) } else { $tag }
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Unable to derive package version from tag '$tag'."
          }

          "package_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore Polymarket.Client.slnx

      - name: Build
        run: dotnet build Polymarket.Client.slnx --configuration Release --no-restore

      - name: Pack
        run: >
          dotnet pack Polymarket.Client.slnx
          --configuration Release
          --no-build
          -p:ContinuousIntegrationBuild=true
          -p:Version=${{ steps.version.outputs.package_version }}
          -o artifacts

      - name: NuGet login (OIDC -> temp API key)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: SunnyDotNet

      - name: Publish packages
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          NUGET_SOURCE_URL: https://api.nuget.org/v3/index.json
        run: |
          Get-ChildItem -Path artifacts -Filter *.nupkg |
            Where-Object { $_.Name -notlike "*.symbols.nupkg" } |
            ForEach-Object {
              dotnet nuget push $_.FullName --api-key $env:NUGET_API_KEY --source $env:NUGET_SOURCE_URL --skip-duplicate
            }

      - name: Configure GitHub Packages source
        shell: pwsh
        env:
          GITHUB_PACKAGES_SOURCE_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          GITHUB_PACKAGES_USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget add source $env:GITHUB_PACKAGES_SOURCE_URL `
            --name github `
            --username $env:GITHUB_PACKAGES_USERNAME `
            --password $env:GITHUB_TOKEN `
            --store-password-in-clear-text

      - name: Publish packages to GitHub Packages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Get-ChildItem -Path artifacts -Filter *.nupkg |
            Where-Object { $_.Name -notlike "*.symbols.nupkg" } |
            ForEach-Object {
              dotnet nuget push $_.FullName --api-key $env:GITHUB_TOKEN --source github --skip-duplicate
            }
